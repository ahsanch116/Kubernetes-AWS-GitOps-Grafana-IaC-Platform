name: CI — Build, Test, Push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'user-service/**'
      - 'product-service/**'
      - 'order-service/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ── Run tests for all 3 services in parallel ──────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test

  # ── Build & push images — only after ALL tests pass ───────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG \
                          ${{ matrix.service }}/

          docker tag $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG \
                     $ECR_REGISTRY/${{ matrix.service }}:latest

          docker push $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.service }}:latest

          echo "Pushed: $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG"

      - name: Update image tag in GitOps repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
          SERVICE:      ${{ matrix.service }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/ahsanch116/gitops-repo.git
          cd gitops-repo

          git config user.email "ci-bot@github-actions.com"
          git config user.name  "GitHub Actions CI"

          mkdir -p image-tags
          echo "${IMAGE_TAG}" > image-tags/${SERVICE}.txt

          git add .
          git diff --staged --quiet || git commit -m "ci: update ${SERVICE} image to ${IMAGE_TAG}"
          git push