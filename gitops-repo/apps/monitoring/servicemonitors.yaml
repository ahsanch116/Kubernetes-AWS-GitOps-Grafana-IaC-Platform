apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-services
  namespace: monitoring
  labels:
    release: monitoring      # must match the Helm release name
spec:
  namespaceSelector:
    matchNames:
      - platform             # scrape services in the platform namespace
  selector:
    matchLabels: {}          # match all services in that namespace
  endpoints:
    - port: http
      path: /metrics
      interval: 15s