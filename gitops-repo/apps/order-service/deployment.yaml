apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 442042534130.dkr.ecr.us-east-1.amazonaws.com/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: USER_SERVICE_URL
              value: "http://user-service.platform.svc.cluster.local:3001"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.platform.svc.cluster.local:3002"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "48Mi"
              cpu: "25m"
            limits:
              memory: "96Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: platform
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
  type: LoadBalancer